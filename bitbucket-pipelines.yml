# The step runs directly inside the prebuilt build-environment image (public, no
# credentials involved) instead of docker-building it per run: Bitbucket's sandboxed
# docker daemon forbids the privileged buildkit container modern `docker build` boots
# ("--privileged=true is not allowed"), and rebuilding the toolchain image every run
# wasted minutes anyway. Rebuild + push with tools/push-build-image.sh after changing
# the Dockerfile, then bump the tag here.
image: cubicattache/gnomecast-webos-build:20260705

clone:
  depth: full

pipelines:
  default:
    - step:
        name: Native webOS build and IPK
        # Self-hosted workspace runners: no Bitbucket build minutes consumed.
        # (`size` is a cloud-runner option and is intentionally absent.)
        runs-on:
          - "self.hosted"
          - "linux"
        script:
          - git config --global --add safe.directory '*'
          - git submodule update --init third_party/IronRDP third_party/lvgl third_party/miniaudio
          - cargo fmt --manifest-path webrdp-min/Cargo.toml --check
          # Quoted: a plain YAML scalar ending in ':' parses as a mapping key.
          - "cargo test --manifest-path webrdp-min/Cargo.toml --features native --locked native::tests::"
          - ./tools/syntax-check-native.sh
          - cmake -S native -B /tmp/gnomecast-native-build
          - cmake --build /tmp/gnomecast-native-build
          - ctest --test-dir /tmp/gnomecast-native-build --output-on-failure
          - ./tools/build-native-webos.sh
        artifacts:
          - dist/native-webos/**
